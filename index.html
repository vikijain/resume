<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kids ABC Fun</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(135deg,#fff7cc,#ffd6e8);
    font-family:Arial,sans-serif;
}

#center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:1000;
}

#emoji{
    font-size:180px;
}

#text{
    font-size:48px;
    font-weight:bold;
}

.floatEmoji{
    position:absolute;
    pointer-events:none;
    user-select:none;
    animation: drift linear forwards;
}

@keyframes drift{
    from{
        transform:translate(0px,0px) rotate(0deg);
        opacity:1;
    }
    to{
        transform:
            translate(var(--dx),var(--dy))
            rotate(var(--rot));
        opacity:0;
    }
}

</style>
</head>
<body>

<div id="center">
    <div id="emoji">🎉</div>
    <div id="text">Press Any Key</div>
</div>

<script>

const alphabet = {

A:{word:"Apple",emoji:"🍎"},
B:{word:"Ball",emoji:"⚽"},
C:{word:"Cat",emoji:"🐱"},
D:{word:"Dog",emoji:"🐶"},
E:{word:"Elephant",emoji:"🐘"},
F:{word:"Fish",emoji:"🐟"},
G:{word:"Giraffe",emoji:"🦒"},
H:{word:"Hat",emoji:"👒"},
I:{word:"Ice Cream",emoji:"🍦"},
J:{word:"Juice",emoji:"🧃"},
K:{word:"Kite",emoji:"🪁"},
L:{word:"Lion",emoji:"🦁"},
M:{word:"Monkey",emoji:"🐵"},
N:{word:"Nest",emoji:"🪺"},
O:{word:"Orange",emoji:"🍊"},
P:{word:"Penguin",emoji:"🐧"},
Q:{word:"Queen",emoji:"👑"},
R:{word:"Rabbit",emoji:"🐰"},
S:{word:"Sun",emoji:"☀️"},
T:{word:"Train",emoji:"🚂"},
U:{word:"Umbrella",emoji:"☂️"},
V:{word:"Violin",emoji:"🎻"},
W:{word:"Whale",emoji:"🐋"},
X:{word:"Xylophone",emoji:"🎼"},
Y:{word:"Yacht",emoji:"🛥️"},
Z:{word:"Zebra",emoji:"🦓"}

};

const emojiEl = document.getElementById("emoji");
const textEl = document.getElementById("text");

function speak(text){

    speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.8;
    u.pitch = 1.4;

    speechSynthesis.speak(u);
}

function createStorm(emoji){

    for(let i=0;i<100;i++){

        const e = document.createElement("div");

        e.className="floatEmoji";
        e.innerText=emoji;

        const size = 30 + Math.random()*70;

        e.style.fontSize=size+"px";

        e.style.left=Math.random()*window.innerWidth+"px";
        e.style.top=Math.random()*window.innerHeight+"px";

        e.style.setProperty(
            "--dx",
            (Math.random()*2000-1000)+"px"
        );

        e.style.setProperty(
            "--dy",
            (Math.random()*2000-1000)+"px"
        );

        e.style.setProperty(
            "--rot",
            (Math.random()*1080-540)+"deg"
        );

        const duration = 4 + Math.random()*6;

        e.style.animationDuration=
            duration+"s";

        document.body.appendChild(e);

        setTimeout(()=>{
            e.remove();
        },duration*1000);
    }
}

function showLetter(letter){

    const data = alphabet[letter];

    emojiEl.innerHTML=data.emoji;
    textEl.innerHTML=
        `${letter} is for ${data.word}`;

    speak(`${letter} is for ${data.word}`);

    createStorm(data.emoji);
}

function randomLetter(){

    const keys =
        Object.keys(alphabet);

    return keys[
        Math.floor(
            Math.random()*keys.length
        )
    ];
}

document.addEventListener("keydown",(event)=>{

    const key =
        event.key.toUpperCase();

    if(alphabet[key]){

        showLetter(key);

    }else{

        showLetter(
            randomLetter()
        );

    }
});

</script>

</body>
</html>
